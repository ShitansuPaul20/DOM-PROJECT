<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Tum chaho toh apna custom font laga lena */
        }
        body {
            height: 100vh;
            width: 100vw;
            background-image: linear-gradient(to bottom right, rgb(88, 88, 255), rgb(179, 28, 179));
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 3rem 2rem;
            overflow-x: hidden;
        }
        .tracker-dashboard {
            background-color: rgba(250, 235, 215, 0.317);
            backdrop-filter: blur(15px);
            width: 800px;
            border-radius: 30px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .header {
            text-align: center;
            color: white;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }
        .header h1 { font-size: 2.5rem; letter-spacing: 2px; }
        .header p { font-size: 1.2rem; margin-top: 5px; opacity: 0.9; }
        
        /* Total Time Card */
        .total-time-card {
            background: rgba(255, 255, 255, 0.695);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            color: rgb(41, 41, 41);
        }
        .total-time-card h2 { font-size: 1.5rem; font-weight: normal; margin-bottom: 10px; }
        .total-time-card .time { font-size: 3rem; font-weight: bold; background: linear-gradient(to right, rgb(88, 88, 255), rgb(179, 28, 179)); -webkit-background-clip: text; color: transparent; }

        /* Chart Container */
        .chart-container {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Task History List */
        .task-list-container h3 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .task-div {
            background-color: rgba(225, 225, 225, 0.8);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgb(41, 41, 41);
            font-size: 1.2rem;
            border-left: 8px solid rgb(88, 88, 255);
            transition: transform 0.2s ease;
        }
        .task-div:hover {
            transform: scale(1.02);
        }
        .task-name { font-weight: bold; width: 70%; word-break: break-word; }
        .task-time { font-weight: bold; color: rgb(179, 28, 179); background: white; padding: 5px 15px; border-radius: 50px;}
        /* --- PROGRESS TRACKER DARK MODE OVERRIDES --- */
    [data-theme="dark"] {
        body { background-image: linear-gradient(to bottom right, #0f172a, #1e293b); background-repeat: no-repeat; }
        .tracker-dashboard {
            background-color: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header h1, .header p, .task-list-container h3 { color: #f1f5f9; }
        .total-time-card {
            background: rgba(15, 23, 42, 0.8);
            color: #f1f5f9;
            .time { background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; }
        }
        .chart-container { background: rgba(15, 23, 42, 0.8); }
        .task-div {
            background-color: rgba(15, 23, 42, 0.8);
            color: #f1f5f9;
            border-left: 8px solid #38bdf8;
        }
        .task-time { background: rgba(30, 41, 59, 0.9); color: #38bdf8; }
    }
        @media (max-width: 1175px) { .tracker-dashboard { width: 90%; margin-top: 80px;}}
        @media (max-width: 700px) { .tracker-dashboard { padding: 25px 20px; } .tracker-dashboard{margin-top: 80px;} .total-time-card .time { font-size: 2.5rem; } }
        @media (max-width: 460px) { .header h1 { font-size: 1.8rem; } .tracker-dashboard{margin-top: 80px;} .total-time-card .time { font-size: 2rem; } .task-div { flex-direction: column; align-items: flex-start; gap: 10px; .task-name { width: 100%; } } }
    </style>
    <link rel="stylesheet" href="dark-mode.css">
</head>
<body>
    <a href="index.htm" style="position: absolute; top: 30px; left: 30px; color: white; text-decoration: none; font-size: 1.2rem;">
        <i class="ri-arrow-left-line"></i> Dashboard
    </a>
    
    <div class="tracker-dashboard">
        <div class="header">
            <h1><i class="ri-bar-chart-box-line"></i> Progress Tracker</h1>
            <p>Your Productivity Analytics</p>
        </div>

        <div class="total-time-card">
            <h2>Total Time Focused Since Start</h2>
            <div class="time" id="totalAppTime">0h 0m</div>
        </div>

        <div class="chart-container">
            <canvas id="progressChart" height="120"></canvas>
        </div>

        <div class="task-list-container">
            <h3><i class="ri-history-line"></i> Task History</h3>
            <div class="task-list" id="taskHistoryList">
                </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Local Storage se data nikaalo
            let data = JSON.parse(localStorage.getItem("appProgressData"));
            
            // Agar data nahi hai (first time user)
            if (!data) {
                document.getElementById('taskHistoryList').innerHTML = "<div class='task-div'>No tasks found. Go to To-Do List to add some!</div>";
                return;
            }

            // 2. TOTAL TIME UPDATE KARO
            let totalHrs = Math.floor(data.totalMinutes / 60);
            let totalMins = data.totalMinutes % 60;
            document.getElementById('totalAppTime').innerText = `${totalHrs}h ${totalMins}m`;

            // 3. GRAPH (CHART.JS) RENDER KARO
            const ctx = document.getElementById('progressChart').getContext('2d');
            let dates = Object.keys(data.daily);
            let minutes = Object.values(data.daily);

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dates.length > 0 ? dates : ['No Data'],
                    datasets: [{
                        label: 'Minutes Worked Per Day',
                        data: minutes.length > 0 ? minutes : [0],
                        backgroundColor: 'rgba(88, 88, 255, 0.7)',
                        borderColor: 'rgb(88, 88, 255)',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            // 4. ALAG ALAG TASK DIVS BANAO
            let taskContainer = document.getElementById('taskHistoryList');
            taskContainer.innerHTML = ""; // Clear loader

            // Sirf wo tasks dikhao jinpe kaam kiya hai (ya fir saare dikha sakte ho)
            let hasTasks = false;
            data.tasks.forEach(task => {
                hasTasks = true;
                let h = Math.floor(task.timeSpent / 60);
                let m = task.timeSpent % 60;
                let timeString = h > 0 ? `${h}h ${m}m` : `${m}m`;

                // Naya div create ho raha hai (Jo tumhe chahiye tha)
                let singleDiv = document.createElement('div');
                singleDiv.className = 'task-div';
                singleDiv.innerHTML = `
                    <div class="task-name">${task.name}</div>
                    <div class="task-time">${timeString}</div>
                `;
                taskContainer.appendChild(singleDiv);
            });

            if (!hasTasks) {
                taskContainer.innerHTML = "<div class='task-div'>No tasks created yet.</div>";
            }
        });
    </script>
    <script src="./global-theme.js"></script>
</body>
</html>
