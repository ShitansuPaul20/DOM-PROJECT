<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="snake.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3>High Score: 
                        <span id="high-score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Score: 
                        <span id="score">0</span>
                    </h3>
                </div>
                <div class="info">
                    <h3>Choose Hardness:</h3> 
                        <span id="time">
                            <input type="number">
                        </span>
                </div>
            </div>
            <div class="board">
               
            </div>
        </section>
        <div class="modal">
            <div class="start-game">
                <h3>Welcome to the snake game</h3>
                <button class="btn btn-start">Start-Game</button>
                <a href="index.htm" style="position: absolute; top: 30px; left: 30px; color: white; text-decoration: none; font-size: 1.2rem;">
                    <i class="ri-arrow-left-line"></i> Dashboard
                </a>
            </div>
            <div class="game-over">
                <h3>Game Over</h3>
                <button class="btn btn-restart">Restart Game</button>
                <a href="index.htm" style="position: absolute; top: 30px; left: 30px; color: white; text-decoration: none; font-size: 1.2rem;">
                    <i class="ri-arrow-left-line"></i> Dashboard
                </a>
            </div>
        </div>
    </main>
    <script src="./snake.js"></script>
    <script src="./global-theme.js"></script>
</body>
</html>
